<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VizHanzi · Flashcards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --coral: #F4875A;
    --mint: #6DC9A0;
    --sky: #7BB8E8;
    --lilac: #B48FD8;
    --gold: #F0C45A;
    --bg: #F8F6F1;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #888;
    --radius: 20px;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -1px;
  }

  header h1 span { color: var(--coral); }

  header p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 4px;
  }

  /* Topic filter pills */
  .topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 700px;
    margin-bottom: 20px;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 999px;
    border: 2px solid transparent;
    background: white;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .pill:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.12); }
  .pill.active { color: white; border-color: transparent; }

  /* Topic colors */
  .t0.active  { background: var(--coral); }
  .t1.active  { background: #E07B54; }
  .t2.active  { background: var(--gold); color: #333; }
  .t3.active  { background: var(--mint); }
  .t4.active  { background: #5BAF8A; }
  .t5.active  { background: var(--sky); }
  .t6.active  { background: #5A9ACF; }
  .t7.active  { background: var(--lilac); }
  .t8.active  { background: #9A72C0; }
  .t9.active  { background: #E0785A; }
  .t10.active { background: #4CAF80; }
  .t11.active { background: #E8A03A; }

  /* Progress */
  .progress-bar-wrap {
    width: 100%;
    max-width: 500px;
    height: 6px;
    background: #ddd;
    border-radius: 99px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--coral);
    border-radius: 99px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 20px;
  }

  /* Card */
  .card-wrap {
    perspective: 1000px;
    width: 100%;
    max-width: 420px;
    height: 280px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    border-radius: var(--radius);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 30px 24px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.1);
  }

  .card-front {
    background: white;
  }

  .card-back {
    background: var(--text);
    color: white;
    transform: rotateY(180deg);
  }

  .hanzi {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 5rem;
    font-weight: 700;
    line-height: 1;
    color: var(--coral);
  }

  .card-back .hanzi { color: var(--gold); }

  .pinyin {
    font-size: 1.1rem;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .card-back .pinyin { color: #aaa; }

  .meaning {
    font-size: 1.5rem;
    font-weight: 600;
    text-align: center;
  }

  .topic-tag {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #bbb;
    position: absolute;
    top: 16px;
    left: 20px;
  }

  .tap-hint {
    font-size: 0.7rem;
    color: #ccc;
    position: absolute;
    bottom: 14px;
    right: 20px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 999px;
    border: none;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-prev { background: white; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn-next { background: var(--coral); color: white; box-shadow: 0 4px 16px rgba(244,135,90,0.4); }
  .btn-shuffle { background: white; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); font-size: 1.1rem; padding: 12px 16px; }

  /* Mode toggle */
  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }

  .mode-label { font-size: 0.78rem; color: var(--muted); }

  .toggle {
    display: flex;
    background: white;
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .toggle-btn {
    padding: 5px 14px;
    border-radius: 999px;
    border: none;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }

  .toggle-btn.active {
    background: var(--text);
    color: white;
  }
</style>
</head>
<body>

<header>
  <h1>Viz<span>Hanzi</span></h1>
  <p>497 words · tap any card to flip</p>
</header>

<div class="topics" id="topicPills"></div>

<div class="mode-row">
  <span class="mode-label">Show:</span>
  <div class="toggle">
    <button class="toggle-btn active" id="modeChar" onclick="setMode('char')">汉字</button>
    <button class="toggle-btn" id="modeMeaning" onclick="setMode('meaning')">English</button>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="progress-text" id="progressText"></div>

<div class="card-wrap" onclick="flipCard()" id="cardWrap">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="topic-tag" id="frontTag"></div>
      <div class="hanzi" id="frontMain"></div>
      <div class="pinyin" id="frontSub"></div>
      <div class="tap-hint">tap to flip</div>
    </div>
    <div class="card-face card-back">
      <div class="topic-tag" id="backTag"></div>
      <div class="hanzi" id="backHanzi"></div>
      <div class="pinyin" id="backPinyin"></div>
      <div class="meaning" id="backMeaning"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-prev" onclick="prevCard()">← Prev</button>
  <button class="btn btn-shuffle" onclick="shuffle()" title="Shuffle">⇄</button>
  <button class="btn btn-next" onclick="nextCard()">Next →</button>
</div>

const TOPICS = [...new Set(ALL_WORDS.map(w=>w.t))];
const TOPIC_COLORS = ['t0','t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11'];

let activeTopic = null;
let deck = [...ALL_WORDS];
let idx = 0;
let flipped = false;
let mode = 'char'; // 'char' or 'meaning'

function buildPills() {
  const wrap = document.getElementById('topicPills');
  const allPill = document.createElement('button');
  allPill.className = 'pill t0 active';
  allPill.textContent = 'All (497)';
  allPill.id = 'pill-all';
  allPill.onclick = () => setTopic(null);
  wrap.appendChild(allPill);

  TOPICS.forEach((t, i) => {
    const count = ALL_WORDS.filter(w=>w.t===t).length;
    const btn = document.createElement('button');
    btn.className = `pill ${TOPIC_COLORS[i]}`;
    btn.textContent = `${t} (${count})`;
    btn.id = `pill-${i}`;
    btn.onclick = () => setTopic(t, i);
    wrap.appendChild(btn);
  });
}

function setTopic(topic, pillIdx) {
  activeTopic = topic;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  if (topic === null) {
    document.getElementById('pill-all').classList.add('active');
    deck = [...ALL_WORDS];
  } else {
    document.getElementById(`pill-${pillIdx}`).classList.add('active');
    deck = ALL_WORDS.filter(w=>w.t===topic);
  }
  idx = 0;
  renderCard();
}

function setMode(m) {
  mode = m;
  document.getElementById('modeChar').classList.toggle('active', m==='char');
  document.getElementById('modeMeaning').classList.toggle('active', m==='meaning');
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function renderCard() {
  const w = deck[idx];
  flipped = false;
  document.getElementById('card').classList.remove('flipped');

  const topicLabel = w.t;

  if (mode === 'char') {
    document.getElementById('frontMain').textContent = w.h;
    document.getElementById('frontSub').textContent = '';
    document.getElementById('frontTag').textContent = topicLabel;
    document.getElementById('backHanzi').textContent = w.h;
    document.getElementById('backPinyin').textContent = w.p;
    document.getElementById('backMeaning').textContent = w.e;
    document.getElementById('backTag').textContent = topicLabel;
  } else {
    document.getElementById('frontMain').style.fontSize = '2.2rem';
    document.getElementById('frontMain').style.fontFamily = 'Space Grotesk, sans-serif';
    document.getElementById('frontMain').style.color = '#1A1A2E';
    document.getElementById('frontMain').textContent = w.e;
    document.getElementById('frontSub').textContent = '';
    document.getElementById('frontTag').textContent = topicLabel;
    document.getElementById('backHanzi').textContent = w.h;
    document.getElementById('backPinyin').textContent = w.p;
    document.getElementById('backMeaning').textContent = w.e;
    document.getElementById('backTag').textContent = topicLabel;
  }

  // Reset hanzi size if toggled back
  if (mode === 'char') {
    document.getElementById('frontMain').style.fontSize = '5rem';
    document.getElementById('frontMain').style.fontFamily = "'Noto Sans SC', sans-serif";
    document.getElementById('frontMain').style.color = 'var(--coral)';
  }

  updateProgress();
}

function updateProgress() {
  const pct = ((idx + 1) / deck.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${deck.length}`;
}

function nextCard() {
  idx = (idx + 1) % deck.length;
  renderCard();
}

function prevCard() {
  idx = (idx - 1 + deck.length) % deck.length;
  renderCard();
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  renderCard();
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextCard();
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

buildPills();
renderCard();
</script>
